---
# FOSS Security Policies
# Define security requirements and scanning policies for all packages

version: "1.0"
last_updated: "2024-01-24"

# Vulnerability Severity Thresholds
severity_levels:
  critical:
    cvss_min: 9.0
    cvss_max: 10.0
    action_required: true
    remediation_sla_hours: 24
    approval_blocked: true
    description: "Critical vulnerabilities that must be addressed immediately"

  high:
    cvss_min: 7.0
    cvss_max: 8.9
    action_required: true
    remediation_sla_hours: 168  # 7 days
    approval_blocked: true
    description: "High severity issues requiring prompt attention"

  medium:
    cvss_min: 4.0
    cvss_max: 6.9
    action_required: true
    remediation_sla_hours: 720  # 30 days
    approval_blocked: false
    description: "Medium severity issues to be addressed in regular cycle"

  low:
    cvss_min: 0.1
    cvss_max: 3.9
    action_required: false
    remediation_sla_hours: 2160  # 90 days
    approval_blocked: false
    description: "Low severity issues for tracking"

  none:
    cvss_min: 0.0
    cvss_max: 0.0
    action_required: false
    approval_blocked: false
    description: "No known vulnerabilities"

# Security Scanning Configuration
scanning:
  automated_scanning: true
  scan_frequency: "daily"
  scan_on_submission: true
  scan_on_update: true
  rescan_approved_packages: true
  rescan_interval_days: 7

  tools:
    - name: "trivy"
      enabled: true
      scan_types:
        - vulnerabilities
        - secrets
        - misconfigurations
      severity_threshold: "MEDIUM"
      
    - name: "grype"
      enabled: true
      scan_types:
        - vulnerabilities
      fail_on: "high"
      
    - name: "snyk"
      enabled: false  # Requires license
      scan_types:
        - vulnerabilities
        - license-compliance
        
    - name: "osv-scanner"
      enabled: true
      scan_types:
        - vulnerabilities
      databases:
        - "OSV"
        - "GitHub Advisory"
        - "NVD"

# Approval Workflow
approval_workflow:
  require_manual_approval: true
  auto_approve_threshold:
    security_score_min: 95
    no_vulnerabilities: true
    approved_license: true
    trusted_publisher: false

  approval_stages:
    - stage: "automated_scan"
      required: true
      blocking: true
      
    - stage: "license_check"
      required: true
      blocking: true
      
    - stage: "security_review"
      required: true
      blocking: false
      approvers:
        - "security-team"
        
    - stage: "architecture_review"
      required: false
      blocking: false
      condition: "critical_package"
      approvers:
        - "architecture-team"

# Package Categories and Risk Levels
package_categories:
  critical:
    description: "Core infrastructure packages"
    examples:
      - "openssl"
      - "openssh"
      - "systemd"
    requirements:
      - security_score_min: 90
      - no_high_vulnerabilities: true
      - regular_updates: true
      - active_maintenance: true
      - architecture_review: true

  high:
    description: "Production application dependencies"
    examples:
      - "web frameworks"
      - "database drivers"
      - "authentication libraries"
    requirements:
      - security_score_min: 85
      - no_critical_vulnerabilities: true
      - security_review: true

  medium:
    description: "Development and build tools"
    examples:
      - "testing frameworks"
      - "build tools"
      - "CLI utilities"
    requirements:
      - security_score_min: 75
      - no_critical_vulnerabilities: true

  low:
    description: "Development-only dependencies"
    examples:
      - "code formatters"
      - "linters"
      - "documentation tools"
    requirements:
      - security_score_min: 70
      - basic_scan: true

# Vulnerability Acceptance Criteria
vulnerability_acceptance:
  allow_exceptions: true
  exception_requires_approval: true
  exception_approvers:
    - "security-lead"
    - "engineering-manager"

  acceptable_reasons:
    - "not_exploitable"
    - "mitigated_by_configuration"
    - "false_positive"
    - "accepted_risk"
    - "no_fix_available"

  exception_expiry:
    default_days: 90
    max_days: 365
    requires_review: true

# Dependency Analysis
dependency_analysis:
  enabled: true
  max_depth: 10
  check_transitive: true
  
  flags:
    - type: "unmaintained"
      threshold_days: 730
      severity: "high"
      
    - type: "deprecated"
      severity: "medium"
      
    - type: "typosquatting"
      severity: "critical"
      
    - type: "malicious"
      severity: "critical"
      block_immediately: true

# Continuous Monitoring
continuous_monitoring:
  enabled: true
  check_frequency: "daily"
  
  monitors:
    - name: "cve_databases"
      sources:
        - "NVD"
        - "GitHub Advisory"
        - "OSV"
        - "Snyk Vulnerability DB"
        
    - name: "license_changes"
      enabled: true
      alert_on_change: true
      
    - name: "package_updates"
      enabled: true
      track_upstream: true
      notify_on_security_update: true

# SBOM (Software Bill of Materials)
sbom:
  generate: true
  formats:
    - "SPDX"
    - "CycloneDX"
  include_dependencies: true
  update_frequency: "on_change"
  storage_path: "/opt/foss-packages/sbom"

# Reporting
reporting:
  enabled: true
  formats:
    - "html"
    - "json"
    - "csv"
    - "pdf"
    
  schedules:
    security_summary:
      frequency: "weekly"
      recipients:
        - "security-team@example.com"
        
    vulnerability_report:
      frequency: "daily"
      recipients:
        - "security-team@example.com"
        
    compliance_report:
      frequency: "monthly"
      recipients:
        - "compliance-team@example.com"
        - "management@example.com"

# Incident Response
incident_response:
  critical_vulnerability_process:
    - "Immediate notification to security team"
    - "Assess impact and exploitability"
    - "Identify affected packages and systems"
    - "Develop remediation plan"
    - "Apply patches or mitigations"
    - "Verify fix effectiveness"
    - "Post-incident review"
    
  notification_channels:
    - "email"
    - "slack"
    - "pagerduty"
    
  escalation_policy:
    level_1: "security-engineer"
    level_2: "security-lead"
    level_3: "ciso"

# Retention and Archival
retention:
  scan_results: 365  # days
  approval_records: 2555  # 7 years
  vulnerability_reports: 1095  # 3 years
  sbom_versions: 730  # 2 years
