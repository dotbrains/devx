<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Accent bar at top -->
  <rect width="1200" height="4" fill="url(#accentGradient)"/>

  <!-- Logo symbol (layered architecture icon) -->
  <g transform="translate(60, 200)">
    <rect width="90" height="90" rx="18" fill="url(#logoGradient)"/>
    <g transform="translate(45, 45)" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Bottom layer -->
      <path d="M -24,10 L 0,20 L 24,10 L 0,0 Z" opacity="0.5"/>
      <!-- Middle layer -->
      <path d="M -24,0 L 0,10 L 24,0 L 0,-10 Z" opacity="0.75"/>
      <!-- Top layer -->
      <path d="M -24,-10 L 0,0 L 24,-10 L 0,-20 Z"/>
    </g>
  </g>

  <!-- Main heading -->
  <text x="180" y="255" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="68" font-weight="700" fill="white" letter-spacing="-1">
    DevX
  </text>

  <!-- Subtitle -->
  <text x="180" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" fill="#94a3b8" letter-spacing="0">
    Secure dev environments, one framework.
  </text>

  <!-- Feature highlights -->
  <g transform="translate(180, 345)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="150" height="38" rx="19" fill="#1e293b" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="75" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="600" fill="#14b8a6" text-anchor="middle">
      3-Tier Model
    </text>

    <!-- Badge 2 -->
    <rect x="165" y="0" width="150" height="38" rx="19" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="240" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="600" fill="#06b6d4" text-anchor="middle">
      App Store
    </text>

    <!-- Badge 3 -->
    <rect x="0" y="50" width="150" height="38" rx="19" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="75" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="600" fill="#22d3ee" text-anchor="middle">
      Ansible
    </text>

    <!-- Badge 4 -->
    <rect x="165" y="50" width="150" height="38" rx="19" fill="#1e293b" stroke="#67e8f9" stroke-width="1.5"/>
    <text x="240" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="600" fill="#67e8f9" text-anchor="middle">
      Airgap Ready
    </text>
  </g>

  <!-- Code snippet decoration -->
  <g transform="translate(720, 160)">
    <rect width="440" height="280" rx="12" fill="#0f1117" stroke="#2d3748" stroke-width="2"/>

    <!-- Code header -->
    <rect width="440" height="40" rx="12" fill="#1e293b"/>
    <circle cx="20" cy="20" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="40" cy="20" r="5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="60" cy="20" r="5" fill="#10b981" opacity="0.8"/>

    <!-- Code content -->
    <text x="20" y="75" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="15" fill="#14b8a6" font-weight="500">$ make build-base-rocky10</text>
    <text x="20" y="105" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#94a3b8">→ Applying security hardening...</text>
    <text x="20" y="130" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#94a3b8">→ SELinux: enforcing</text>
    <text x="20" y="155" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#10b981">✓ Base image ready</text>

    <text x="20" y="195" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="15" fill="#14b8a6" font-weight="500">$ make build-org-standard</text>
    <text x="20" y="225" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#94a3b8">→ Installing 17+ dev tools...</text>
    <text x="20" y="250" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#10b981">✓ Organization spin ready</text>
  </g>

  <!-- Bottom accent -->
  <rect y="626" width="1200" height="4" fill="url(#accentGradient)"/>
</svg>
