[defaults]
inventory = ./inventory
roles_path = ../../shared/ansible/roles
library = ../../shared/ansible/modules
filter_plugins = ../../shared/ansible/plugins/filter
callback_plugins = ../../shared/ansible/plugins/callback
lookup_plugins = ../../shared/ansible/plugins/lookup

# Performance
forks = 10
gather_timeout = 30
timeout = 30

# Output
stdout_callback = yaml
display_skipped_hosts = false
display_ok_hosts = true

# Privilege escalation
become = true
become_method = sudo
become_user = root
become_ask_pass = false

# SSH
host_key_checking = false
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = true

# Logging
log_path = ./ansible.log

# Retry
retry_files_enabled = false

[inventory]
enable_plugins = host_list, yaml, ini, auto

[privilege_escalation]
become = true
become_method = sudo
become_user = root
become_ask_pass = false

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ForwardAgent=yes
pipelining = true
control_path = %(directory)s/%%h-%%r
