name: Ansible Lint

on:
  push:
    branches:
      - master
      - main
      - develop
    paths:
      - 'packages/**/ansible/**/*.yml'
      - 'packages/**/ansible/**/*.yaml'
      - 'shared/ansible/**/*.yml'
      - 'shared/ansible/**/*.yaml'
      - 'requirements.yml'
      - '.ansible-lint'
      - '.github/workflows/ansible-lint.yml'
  pull_request:
    branches:
      - master
      - main
      - develop
    paths:
      - 'packages/**/ansible/**/*.yml'
      - 'packages/**/ansible/**/*.yaml'
      - 'shared/ansible/**/*.yml'
      - 'shared/ansible/**/*.yaml'
      - 'requirements.yml'
      - '.ansible-lint'
      - '.github/workflows/ansible-lint.yml'
  workflow_dispatch:

jobs:
  ansible-lint:
    name: Lint Ansible Playbooks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Ansible and ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: make lint-ci

      - name: Annotate ansible-lint results
        if: failure()
        run: |
          echo "::error::ansible-lint failed. Please fix the issues and try again."
